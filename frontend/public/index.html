<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Virtual</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <header class="bg-gray-900 text-white py-4">
    <div class="max-w-7xl mx-auto px-4">
      <h1 class="text-2xl font-bold">👕 VirtualStyle</h1>
    </div>
  </header>
  
  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-12 rounded-lg text-center">
      <h2 class="text-4xl font-bold mb-4">Bem-vindo à VirtualStyle</h2>
      <p class="text-xl">Sua loja virtual está NO AR! 🎉</p>
    </div>
    
    <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="p-6 bg-white rounded-lg border">
        <h3 class="font-bold text-xl mb-2">✅ Frontend</h3>
        <p>Vercel - Online</p>
      </div>
      <div class="p-6 bg-white rounded-lg border">
        <h3 class="font-bold text-xl mb-2">⏳ Backend</h3>
        <p>Railway - Em desenvolvimento</p>
      </div>
      <div class="p-6 bg-white rounded-lg border">
        <h3 class="font-bold text-xl mb-2">📦 GitHub</h3>
        <p>Sincronizado</p>
      </div>
    </div>
  </main>
</body>
</html>
